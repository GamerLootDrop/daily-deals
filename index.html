<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Free Games & Deals Radar - Free Steam Keys, Epic Games Giveaway</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Get daily free Steam keys, Epic Games giveaway codes, and limited-time game deals. Claim your free PC games now at GamerLootDrop!">
    <meta name="keywords" content="Free Steam Keys, Epic Games Giveaway, Free PC Games, Game Deals, Steam Giveaway, Epic Free Games, Limited Time Games, GamerLootDrop">
    <meta name="author" content="GamerLootDrop">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Daily Free Games & Deals - Free Steam Keys, Epic Giveaway">
    <meta property="og:description" content="Claim free PC games daily! Steam keys, Epic Games giveaways, and exclusive deals.">
    <meta property="og:url" content="https://gamerlootdrop.github.io/daily-deals/">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        #deal-list {
            width: 100%;
            max-width: 1400px;
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            padding: 10px;
        }
        .deal-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #222222 100%);
            border: 1px solid #333;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .deal-card:hover {
            transform: translateY(-8px);
            border-color: #00ff88;
            box-shadow: 0 20px 40px rgba(0, 255, 136, 0.15),
                        0 0 30px rgba(0, 255, 136, 0.1);
        }
        .deal-image {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #0d0d0d;
        }
        .deal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .deal-card:hover .deal-image img {
            transform: scale(1.05);
        }
        .deal-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .deal-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .deal-desc {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 16px;
            flex: 1;
        }
        .deal-price-row {
            margin-bottom: 16px;
        }
        .deal-price {
            color: #00ff88;
            font-weight: 700;
            font-size: 1.25rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        .deal-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0d0d0d;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .deal-btn:hover {
            background: linear-gradient(135deg, #00ffaa 0%, #00ee7a 100%);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }
        .empty-state {
            color: #666;
            text-align: center;
            padding: 60px 20px;
            font-style: italic;
            grid-column: 1 / -1;
        }
        @media (max-width: 768px) {
            #deal-list {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎯 Daily Free Games & Deals Radar</h1>
    <ul id="deal-list">
        <li class="empty-state">Scanning for latest deals...</li>
    </ul>
</body>
</html>
