<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WX69EH1WFL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WX69EH1WFL');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerLootDrop | Latest Free Steam Keys & PC Giveaways Daily</title>
    <meta name="description" content="Get the latest free Steam keys, Epic Games giveaways, and mobile game loot. Updated every 24 hours.">
    
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #00ff87; --hot: #ff4757; --text: #f1f2f6; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        
        .header { text-align: center; padding: 60px 0 30px; }
        .header h1 { font-size: 3rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,255,135,0.3); }
        
        /* 分类筛选按钮样式 */
        .filter-container { text-align: center; margin-bottom: 30px; }
        .filter-btn { background: #2f3542; border: none; color: white; padding: 8px 18px; margin: 5px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        /* 推广位特效 */
        .card.featured { border: 2px solid var(--hot); box-shadow: 0 0 20px rgba(255, 71, 87, 0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px rgba(255,71,87,0.2); } 50% { box-shadow: 0 0 25px rgba(255,71,87,0.5); } 100% { box-shadow: 0 0 10px rgba(255,71,87,0.2); } }

        .card { background: var(--card); border-radius: 16px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #2f3542; display: flex; flex-direction: column; height: 100%; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card-img { width: 100%; height: 170px; object-fit: cover; }
        .card-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .tag { align-self: flex-start; font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; color: var(--primary); margin-bottom: 12px; font-weight: bold; text-transform: uppercase; }
        
        .title { font-size: 1.1rem; margin: 0 0 20px 0; font-weight: 700; height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn { margin-top: auto; display: block; text-align: center; background: var(--primary); color: #000; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 800; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); letter-spacing: 1px; }
        
        footer { text-align: center; margin-top: 80px; padding: 40px; color: #57606f; border-top: 1px solid #2f3542; }
        .footer-links a { color: #a4b0be; text-decoration: none; margin: 0 15px; font-size: 0.9rem; }
        .footer-links a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 GamerLootDrop</h1>
        <p>Your Automatic Gateway to Free Games & Deals</p>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGames('all')">All Games</button>
        <button class="filter-btn" onclick="filterGames('steam')">Steam</button>
        <button class="filter-btn" onclick="filterGames('epic')">Epic Games</button>
        <button class="filter-btn" onclick="filterGames('pc')">PC Store</button>
        <button class="filter-btn" onclick="filterGames('mobile')">Mobile</button>
    </div>
    
    <div class="grid" id="game-grid">
        <div class="card featured" data-platform="pc">
            <img class="card-img" src="https://media.rawg.io/media/games/082/082365507ff04d456c700157072d35db.jpg" alt="Forza Horizon 6">
            <div class="card-content">
                <span class="tag" style="background: var(--hot); color: #fff;">🔥 TOP PRE-ORDER</span>
                <h3 class="title">Forza Horizon 6 - Epic Pre-order Deal!</h3>
                <a href="https://www.g2a.com/n/forza-6-deal" target="_blank" class="btn" style="background: var(--hot); color: #fff;">Get Deal Now</a>
            </div>
        </div>
        </div>

    <footer>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </div>
        <p style="margin-top:20px;">&copy; 2024 GamerLootDrop. Updated daily by AI.</p>
    </footer>

    <script>
        let allGamesData = [];

        async function loadGames() {
            try {
                const response = await fetch('deals.json?v=' + new Date().getTime());
                allGamesData = await response.json();
                renderGames(allGamesData);
            } catch (err) {
                console.log("Waiting for robot update...");
            }
        }

        function renderGames(games) {
            const grid = document.getElementById('game-grid');
            // 保留第一个推广位
            const featured = grid.firstElementChild.outerHTML;
            grid.innerHTML = featured;

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                // 简单的平台识别逻辑用于筛选
                card.setAttribute('data-platform', game.platform.toLowerCase());
                
                card.innerHTML = `
                    <img class="card-img" src="${game.image}" alt="${game.title}" loading="lazy">
                    <div class="card-content">
                        <span class="tag">${game.platform}</span>
                        <h3 class="title" title="${game.title}">${game.title}</h3>
                        <a href="${game.link}" target="_blank" class="btn">Claim Now</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGames(platform) {
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                if (platform === 'all') {
                    card.style.display = 'flex';
                } else {
                    // 检查卡片平台上是否包含关键词
                    const cardPlatform = card.getAttribute('data-platform');
                    card.style.display = cardPlatform.includes(platform) ? 'flex' : 'none';
                }
            });
            // 确保推广位始终显示
            document.querySelector('.card.featured').style.display = 'flex';
        }

        window.onload = loadGames;
    </script>
</body>
</html>
