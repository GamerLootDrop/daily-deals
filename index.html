<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WX69EH1WFL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerLootDrop | Get Free Steam Keys & PC Giveaways Daily</title>
    <meta name="description" content="Instant alerts for free Steam keys, Epic Games giveaways, and PC gaming loot. Updated every 24 hours by AI.">
    
    <style>
        /* 2. 保留原有的核心配色方案 */
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #00ff87; --hot: #ff4757; --text: #f1f2f6; --discord: #5865F2; --tg: #26A5E4; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        
        .header { text-align: center; padding: 40px 0 20px; }
        .header h1 { font-size: 3rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,255,135,0.3); }
        
        .banner-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 40px; padding: 0 10px; }
        
        /* 按钮动画效果保持不变 */
        .discord-btn, .tg-btn {
            display: inline-flex; align-items: center; gap: 10px; color: white;
            text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 1rem; transition: 0.3s;
        }
        .discord-btn { background: var(--discord); box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); animation: discord-pulse 2s infinite; }
        .tg-btn { background: var(--tg); box-shadow: 0 4px 15px rgba(38, 165, 228, 0.4); animation: tg-pulse 2s infinite; }
        
        @keyframes discord-pulse { 0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(88, 101, 242, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); } }
        @keyframes tg-pulse { 0% { box-shadow: 0 0 0 0 rgba(38, 165, 228, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(38, 165, 228, 0); } 100% { box-shadow: 0 0 0 0 rgba(38, 165, 228, 0); } }

        .filter-container { text-align: center; margin-bottom: 30px; }
        .filter-btn { background: #2f3542; border: none; color: white; padding: 8px 18px; margin: 5px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #2f3542; display: flex; flex-direction: column; height: 100%; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card.featured { border: 2px solid var(--hot); box-shadow: 0 0 20px rgba(255, 71, 87, 0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px rgba(255,71,87,0.2); } 50% { box-shadow: 0 0 25px rgba(255,71,87,0.5); } 100% { box-shadow: 0 0 10px rgba(255,71,87,0.2); } }

        .card-img { width: 100%; height: 170px; object-fit: cover; }
        .card-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .tag { align-self: flex-start; font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; color: var(--primary); margin-bottom: 12px; font-weight: bold; text-transform: uppercase; }
        .title { font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 700; height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn { margin-top: auto; display: block; text-align: center; background: var(--primary); color: #000; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 800; transition: 0.3s; border:none; cursor:pointer; }
        .btn:hover { filter: brightness(1.2); letter-spacing: 1px; }
        .btn.copied { background: #fff !important; color: #000 !important; }

        /* 3. 评论区布局 */
        .comment-section { max-width: 1200px; margin: 60px auto 20px; padding: 20px; background: #151515; border-radius: 16px; border: 1px solid #333; }
        
        footer { text-align: center; margin-top: 40px; padding: 40px; color: #57606f; border-top: 1px solid #2f3542; }
        .footer-links a { color: #a4b0be; text-decoration: none; margin: 0 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 GamerLootDrop</h1>
        <p>Your AI-Powered Gateway to Free Games & Premium Deals</p>
    </div>

    <div class="banner-container">
        <a href="https://discord.gg/GnBx7S9pWz" target="_blank" class="discord-btn">DISCORD</a>
        <a href="https://t.me/GamerLootDaily" target="_blank" class="tg-btn">TELEGRAM</a>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGames('all')">All Deals</button>
        <button class="filter-btn" onclick="filterGames('steam')">Steam</button>
        <button class="filter-btn" onclick="filterGames('epic')">Epic Games</button>
        <button class="filter-btn" onclick="filterGames('pc')">PC Store</button>
        <button class="filter-btn" onclick="filterGames('mobile')">Mobile</button>
    </div>
    
    <div class="grid" id="game-grid">
        <div class="card featured" data-platform="pc">
            <img class="card-img" src="https://media.rawg.io/media/games/082/082365507ff04d456c700157072d35db.jpg" alt="Forza Horizon 6">
            <div class="card-content">
                <span class="tag" style="background: var(--hot); color: #fff;">🔥 MOST WANTED</span>
                <h3 class="title">Forza Horizon 6 - Exclusive Pre-order Deal!</h3>
                <a href="https://www.g2a.com/n/forza-6-deal" target="_blank" class="btn" style="background: var(--hot); color: #fff;">Check Deal</a>
            </div>
        </div>
    </div>

    <div class="comment-section">
        <h2 style="color:var(--primary); margin-bottom: 20px; font-size: 1.5rem;">💬 Community Discussion</h2>
        <script src="https://giscus.app/client.js"
                data-repo="GamerLootDrop/daily-deals"
                data-repo-id="R_kgDOSLkHPg"
                data-category="General"
                data-category-id="DIC_kwDOSLkHPs4C7x97"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="dark"
                data-lang="zh-CN"
                crossorigin="anonymous"
                async>
        </script>
    </div>

    <footer>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </div>
        <p style="margin-top:20px;">&copy; 2026 GamerLootDrop. Automated by AI Bot.</p>
    </footer>

    <script>
        let allGamesData = [];

        // 5. 新增功能：黄色按钮点一下自动复制链接并跳转
        async function handleAction(url, isLoot, btn) {
            if (!isLoot) {
                window.open(url, '_blank');
                return;
            }
            try {
                await navigator.clipboard.writeText(url);
                const oldText = btn.innerText;
                btn.innerText = "✅ Link Copied!";
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.classList.remove('copied');
                    window.open(url, '_blank');
                }, 600);
            } catch (err) {
                window.open(url, '_blank');
            }
        }

        async function loadGames() {
            try {
                const response = await fetch('deals.json?v=' + new Date().getTime());
                allGamesData = await response.json();
                renderGames(allGamesData);
            } catch (err) { console.log("Fetching latest loot..."); }
        }

        function renderGames(games) {
            const grid = document.getElementById('game-grid');
            const featuredCard = grid.querySelector('.featured').outerHTML;
            grid.innerHTML = featuredCard;

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                const platformInfo = (game.platforms || "PC").toLowerCase();
                card.setAttribute('data-platform', platformInfo);
                
                // 识别礼包/代码逻辑
                const titleLower = game.title.toLowerCase();
                const isLoot = titleLower.includes('code') || titleLower.includes('pack') || titleLower.includes('key');
                const tagColor = isLoot ? '#ffcc00' : 'var(--primary)';
                const btnText = isLoot ? 'Get Loot/Code' : 'Claim Now';
                const btnStyle = isLoot ? 'style="background:#ffcc00;color:#000;"' : '';

                card.innerHTML = `
                    <img class="card-img" src="${game.image}" alt="${game.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x170'">
                    <div class="card-content">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                            <span class="tag" style="color:${tagColor}; border:1px solid ${tagColor};">${game.platforms || 'PC'}</span>
                            <span style="color:var(--primary); font-size:0.8rem; font-weight:bold;">${game.worth || 'FREE'}</span>
                        </div>
                        <h3 class="title">${game.title}</h3>
                        <p style="font-size:0.75rem; color:#888; margin-bottom:10px;">⏳ Ends: ${game.end_date || 'Limited Time'}</p>
                        <button onclick="handleAction('${game.open_giveaway_url}', ${isLoot}, this)" class="btn" ${btnStyle}>${btnText}</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGames(platform) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(window.event) window.event.target.classList.add('active');

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                if (platform === 'all' || card.classList.contains('featured')) {
                    card.style.display = 'flex';
                } else {
                    const cardPlatform = card.getAttribute('data-platform') || "";
                    card.style.display = cardPlatform.includes(platform.toLowerCase()) ? 'flex' : 'none';
                }
            });
        }

        window.onload = loadGames;
    </script>
</body>
</html>
