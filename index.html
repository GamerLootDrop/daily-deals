<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WX69EH1WFL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WX69EH1WFL');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerLootDrop - Daily Free Games</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #27ae60; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; }
        .header h1 { font-size: 2.5rem; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid #333; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .tag { align-self: flex-start; font-size: 0.7rem; background: #333; padding: 4px 8px; border-radius: 4px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        
        .title { font-size: 1rem; margin: 0 0 15px 0; line-height: 1.4; height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        
        .btn { margin-top: auto; display: block; text-align: center; background: var(--primary); color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        footer { text-align: center; margin-top: 50px; padding: 20px; color: #666; font-size: 0.9rem; border-top: 1px solid #333; }
        footer a { color: #888; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 GamerLootDrop</h1>
        <p>Your Daily Source for Global Free Games</p>
    </div>
    
    <div class="grid" id="games-container">
        <div class="card" style="border-color: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3);">
            <img class="card-img" src="https://media.rawg.io/media/games/082/082365507ff04d456c700157072d35db.jpg" alt="Forza Horizon 6">
            <div class="card-content">
                <span class="tag" style="background: #e74c3c; color: #fff;">🔥 TOP PRE-ORDER</span>
                <h3 class="title">Forza Horizon 6 - Epic Pre-order Deal!</h3>
                <a href="https://www.g2a.com/n/forza-6-deal" target="_blank" class="btn" style="background: #e74c3c; color: #fff;">Get it now</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 GamerLootDrop. All rights reserved.</p>
        <a href="about.html">About Us</a> | 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="terms.html">Terms of Service</a>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('games-container');
            
            // 💡 加上了时间戳防缓存机制，确保每天都能看到最新的免费游戏
            const fetchUrl = 'deals.json?v=' + new Date().getTime();
            
            fetch(fetchUrl)
                .then(response => {
                    if (!response.ok) throw new Error("无法加载数据");
                    return response.json();
                })
                .then(data => {
                    data.forEach(game => {
                        const imgUrl = game.thumbnail || game.image || 'https://via.placeholder.com/280x160?text=No+Image';
                        const gameTitle = game.title || 'Free Game';
                        const platforms = game.platforms || 'PC';
                        const link = game.open_giveaway_url || game.url || '#';

                        const cardHTML = `
                            <div class="card">
                                <img class="card-img" src="${imgUrl}" alt="${gameTitle}">
                                <div class="card-content">
                                    <span class="tag">${platforms}</span>
                                    <h3 class="title" title="${gameTitle}">${gameTitle}</h3>
                                    <a href="${link}" target="_blank" class="btn">Claim Now</a>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                    });
                })
                .catch(error => console.error("加载新游戏失败，请检查 deals.json 文件:", error));
        });
    </script>
</body>
</html>
